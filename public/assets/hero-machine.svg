<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#0b0b0b" />
      <stop offset="1" stop-color="#262626" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)" />
  <!-- stylized industrial machine silhouette -->
  <g transform="translate(120,140) scale(0.7)">
    <rect x="60" y="220" width="820" height="420" rx="28" fill="#111" opacity="0.98" />
    <rect x="120" y="140" width="700" height="160" rx="18" fill="#1c1c1c" />
    <rect x="760" y="260" width="60" height="220" rx="8" fill="#2d2d2d" />
    <circle cx="240" cy="430" r="70" fill="#333" />
    <rect x="360" y="360" width="400" height="160" rx="12" fill="#0f0f0f" opacity="0.9" />
    <rect x="380" y="420" width="120" height="40" rx="6" fill="#b78b3a" opacity="0.12" />
    <rect x="540" y="420" width="160" height="40" rx="6" fill="#b78b3a" opacity="0.08" />
    <g transform="translate(120,80)" fill="#222">
      <rect x="0" y="0" width="200" height="28" rx="6" />
      <rect x="0" y="40" width="120" height="24" rx="6" />
    </g>
    <g transform="translate(700,380) rotate(8)">
      <rect x="0" y="0" width="160" height="16" rx="8" fill="#2a2a2a" />
    </g>
    <g filter="url(#blur)" opacity="0.06">
      <ellipse cx="500" cy="680" rx="420" ry="80" fill="#000" />
    </g>
  </g>
</svg>
